<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Juan Manuel Gómez</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./styles/styles.css">
</head>
<body>

    <header class="bg-dark text-white shadow-sm">
        <nav class="navbar navbar-expand-lg navbar-dark container">
            <div class="container-fluid">
                <a class="navbar-brand fw-bold" href="./index.html">Ecommerce</a>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="./index.html">Inicio</a></li>
                        <li class="nav-item"><a class="nav-link" href="./crud.html">Administración</a></li>
                        <li class="nav-item"><a class="nav-link active" href="./contact.html">Contacto</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="text-center mb-4">
                    <h2 class="fw-bold">Ponete en contacto</h2>
                    <p class="text-muted">¿Tenés alguna duda o consulta? Escribinos.</p>
                </div>

                <section class="card shadow-sm border-0 rounded-4 p-4">
                    <form id="contact-form">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="name" class="form-label">Nombre</label>
                                <input type="text" id="name" class="form-control" placeholder="Nombre" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="lastName" class="form-label">Apellido</label>
                                <input type="text" id="lastName" class="form-control" placeholder="Apellido" required>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="email" class="form-label">Correo Electrónico</label>
                            <input type="email" id="email" class="form-control" placeholder="nombre@ejemplo.com" required>
                        </div>

                        <div class="mb-3">
                            <label for="phone" class="form-label">Teléfono (Opcional)</label>
                            <input type="tel" id="phone" class="form-control" placeholder="+54 11 ...">
                        </div>

                        <div class="mb-3">
                            <label for="matter" class="form-label">Asunto</label>
                            <input type="text" id="matter" class="form-control" placeholder="Motivo de tu mensaje" required>
                        </div>

                        <div class="mb-3">
                            <label for="message" class="form-label">Mensaje</label>
                            <textarea id="message" class="form-control" rows="4" placeholder="Escribí tu consulta aquí..." required></textarea>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg rounded-pill shadow-sm">
                                Enviar Mensaje 🚀
                            </button>
                        </div>
                    </form>
                </section>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white py-4 mt-auto">
        <div class="container text-center">
            <p class="mb-0">© 2026 ISTEA - Laboratorio Aplicaciones Web Cliente - Juan Manuel Gómez</p>
            <small class="text-secondary">📧 jmgomezn8@gmail.com</small>
        </div>
    </footer>

    <div id="global-message" class="global-message hidden"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/data.js"></script>
    <script src="./js/contact.js"></script>
    <script src="./js/cart.js"></script>
</body>
</html>
