<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISTEA Store | Juan Manuel Gómez</title>
    <link rel="icon" href="./img/favicon.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./styles/styles.css">
</head>
<body>

    <header class="bg-dark text-white sticky-top shadow">
        <nav class="navbar navbar-expand-lg navbar-dark container">
            <div class="container-fluid">
                <a class="navbar-brand fw-bold" href="./index.html">ISTEA Store</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto align-items-center">
                        <li class="nav-item"><a class="nav-link active" href="./index.html">Inicio</a></li>
                        <li class="nav-item"><a class="nav-link" href="./crud.html">Administración</a></li>
                        <li class="nav-item"><a class="nav-link" href="./contact.html">Contacto</a></li>
                        <li class="nav-item ms-lg-3">
                            <button class="btn btn-outline-light position-relative" id="btn-open-cart">
                                <span id="cart-badge">🛒 (0)</span>
                            </button>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container my-5">
        <section class="row justify-content-center mb-5">
            <div class="col-md-6">
                <div class="text-center mb-4 prop">
                    <h1 class="display-5 fw-bold">Nuestro Catálogo</h1>
                    <p class="text-muted">Encontrá lo que buscás al mejor precio.</p>
                </div>
                <div class="input-group">
                    <input type="text" id="search-input" class="form-control form-control-lg" placeholder="Buscar productos...">
                    <span class="input-group-text bg-primary text-white">🔍</span>
                </div>
            </div>
        </section>

        <section id="products">
            <div id="products-cards-grid" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
                </div>
        </section>
    </main>

    <div class="modal fade" id="productModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content" id="product-detail">
                </div>
        </div>
    </div>

    <div class="offcanvas offcanvas-end" tabindex="-1" id="cartSidebar">
        <div class="offcanvas-header border-bottom">
            <h5 class="offcanvas-title fw-bold">Mi Carrito</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body">
            <div id="cart">
                </div>
            <div id="cart-info" class="mt-4 border-top pt-3">
                <div id="cart-total" class="mb-3"></div>
                <div class="d-grid gap-2">
                    <button class="btn btn-success" id="btn-checkout">Finalizar Compra</button>
                    <button class="btn btn-outline-danger btn-sm" id="btn-empty-cart">Vaciar Carrito</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white py-4 mt-auto">
        <div class="container text-center">
            <p class="mb-0">© 2026 ISTEA - Laboratorio Aplicaciones Web Cliente - Juan Manuel Gómez</p>
            <small class="text-secondary">📧 jmgomezn8@gmail.com</small>
        </div>
    </footer>

    <div id="global-message" class="global-message hidden"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/data.js"></script>
    <script src="./js/index.js"></script>
</body>
</html>
