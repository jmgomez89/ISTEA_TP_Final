<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administración</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./styles/styles.css">
</head>
<body>

    <header class="bg-dark text-white shadow-sm">
        <nav class="navbar navbar-expand-lg navbar-dark container">
            <div class="container-fluid">
                <a class="navbar-brand fw-bold" href="./index.html">Ecommerce</a>
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" href="./index.html">Volver a la Tienda</a>
                </div>
            </div>
        </nav>
    </header>

    <main class="container my-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold mb-0">Gestión de Inventario</h2>
                <p class="text-muted">Administración de productos y stock</p>
            </div>
            <button class="btn btn-primary shadow-sm" id="btn-product-create">
                + Agregar Nuevo Producto
            </button>
        </div>

        <section class="card shadow-sm border-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-4">Imagen</th>
                            <th>Producto</th>
                            <th>Precio</th>
                            <th>Stock</th>
                            <th class="text-end pe-4">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="admin-products-table">
                        </tbody>
                </table>
            </div>
        </section>
    </main>

    <div class="modal fade" id="crudModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold" id="crudModalTitle">Nuevo Producto</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="crud-form">
                        <div class="mb-3">
                            <label for="product-name" class="form-label">Nombre del Producto</label>
                            <input type="text" id="product-name" class="form-control" required>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="product-price" class="form-label">Precio ($)</label>
                                <input type="number" id="product-price" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="product-stock" class="form-label">Stock inicial</label>
                                <input type="number" id="product-stock" class="form-control" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="product-image" class="form-label">Imagen</label>
                            <input type="file" id="product-image" class="form-control" accept="image/*">
                            <div id="image-preview-container" class="mt-2 hidden">
                                <small class="text-muted d-block mb-1">Imagen actual:</small>
                                <img id="image-preview" src="" class="img-thumbnail" style="height: 100px;">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="product-details" class="form-label">Descripción / Detalles</label>
                            <textarea id="product-details" class="form-control" rows="3" required></textarea>
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary" id="btn-product-save">Guardar Cambios</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white py-4 mt-auto">
        <div class="container text-center">
            <p class="mb-0">© 2026 ISTEA - Laboratorio Aplicaciones Web Cliente - Juan Manuel Gómez</p>
            <small class="text-secondary">📧 jmgomezn8@gmail.com</small>
        </div>
    </footer>

    <div id="global-message" class="global-message hidden"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/data.js"></script>
    <script src="./js/crud.js"></script>
</body>
</html>
